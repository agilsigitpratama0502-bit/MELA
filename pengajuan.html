<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengajuan - Sahabat Keluarga Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pengajuan">

    <h1>Form Pengajuan Layanan</h1>

    <p>Silakan isi data berikut, kami akan segera menghubungi Anda.</p>

    <form>

        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan nama lengkap">

        <label>Nomor WhatsApp</label>
        <input type="tel" placeholder="08xxxxxxxxxx">

        <label>Alamat</label>
        <textarea placeholder="Masukkan alamat lengkap"></textarea>

        <label>Pilih Layanan</label>

        <select>
            <option>Caregiver Lansia</option>
            <option>Baby Sitter</option>
            <option>Asisten Rumah Tangga (ART)</option>
        </select>

        <label>Tanggal Mulai</label>
        <input type="date">

        <label>Catatan Tambahan</label>

        <textarea placeholder="Tuliskan kebutuhan khusus jika ada"></textarea>

        <button type="submit">Kirim Pengajuan</button>

    </form>

</section>

</body>
</html>
